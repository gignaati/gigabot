#
# Automatically merges PRs opened by the Giga Bot agent
# after passing all required checks.
# =============================================================================

name: Auto-Merge Giga Bot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  auto-merge:
    name: Auto-Merge Agent PR
    runs-on: ubuntu-latest
    if: github.actor == 'github-actions[bot]' || startsWith(github.head_ref, 'job/')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PR paths
        id: validate
        env:
          ALLOWED_PATHS: ${{ vars.ALLOWED_PATHS }}
        run: |
          echo "🔍 Validating PR file paths for auto-merge eligibility..."
          node lib/agent/validate-paths.js || echo "Path validation skipped"

      - name: Auto-merge PR
        if: steps.validate.outcome == 'success' || steps.validate.outcome == 'skipped'
        env:
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
        run: |
          echo "✅ Giga Bot — Auto-merging PR #${{ github.event.pull_request.number }}"
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch \
            --body "Auto-merged by Giga Bot. Powered by Gignaati — https://www.gignaati.com"
